<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CropWise</title>
    <style>
      /* Aggressively Conceal default Google Translate Banner and Tooltips */
      iframe.skiptranslate { display: none !important; visibility: hidden !important; }
      .goog-te-banner-frame { display: none !important; visibility: hidden !important; }
      .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
      body { top: 0px !important; position: static !important; }
      #google_translate_element { display: none !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,hi,ur,pa,mr,gu,bn,ta'}, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
